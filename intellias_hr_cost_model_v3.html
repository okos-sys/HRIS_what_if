
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body, div, span, p, button { font-family: Helvetica, Arial, sans-serif; }
.root { background: #fff; color: #000; }
.hdr { background: #000; padding: 16px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
.hdr-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: -0.01em; }
.hdr-sub { font-size: 11px; color: #6F6F6F; margin-top: 2px; }
.hdr-tag { font-size: 10px; color: #00E5A0; text-transform: uppercase; letter-spacing: 0.1em; }
.ctrl { background: #F4F4F4; border-bottom: 1px solid #E0E0E0; padding: 14px 20px 10px; }
.ctrl-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #6F6F6F; margin-bottom: 6px; }
.ctrl-num { font-size: 24px; font-weight: 700; color: #000; margin-bottom: 8px; }
.slider-wrap { position: relative; padding: 0 0 20px; }
.ctrl-range { width: 100%; accent-color: #00E5A0; display: block; }
.ticks { position: absolute; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-between; pointer-events: none; }
.tick { font-size: 10px; color: #C8C8C8; text-align: center; transform: translateX(-50%); }
.tick:first-child { transform: translateX(0); }
.tick:last-child { transform: translateX(-100%); }
.tabs { display: flex; border-bottom: 1px solid #E0E0E0; background: #fff; padding: 0 20px; gap: 24px; }
.tab { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #9F9F9F; padding: 12px 0; border: none; border-bottom: 2px solid transparent; background: none; cursor: pointer; }
.tab.on { color: #000; border-bottom-color: #00E5A0; }
.body { padding: 18px 20px; }
.kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1px; background: #E0E0E0; border: 1px solid #E0E0E0; margin-bottom: 18px; }
.kpi { background: #fff; padding: 12px 14px; border-top: 3px solid transparent; }
.kpi.best { border-top-color: #00E5A0; }
.kpi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.kpi-name { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #6F6F6F; line-height: 1.3; display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.kpi-badge { font-size: 9px; font-weight: 700; background: #00E5A0; color: #000; padding: 1px 6px; text-transform: uppercase; letter-spacing: 0.06em; display: inline-block; margin-bottom: 5px; }
.kpi-y1 { font-size: 20px; font-weight: 700; color: #000; line-height: 1; }
.kpi-y2 { font-size: 11px; color: #9F9F9F; margin-top: 3px; }
.chart-box { border: 1px solid #E0E0E0; padding: 14px 16px; margin-bottom: 14px; }
.chart-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #6F6F6F; margin-bottom: 12px; }
.bar-row { margin-bottom: 9px; }
.bar-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
.bar-lname { font-size: 12px; color: #000; display: flex; align-items: center; gap: 6px; }
.bar-amt { font-size: 12px; font-weight: 700; }
.bar-track { height: 4px; background: #F4F4F4; border-radius: 2px; }
.bar-fill { height: 4px; border-radius: 2px; transition: width 0.3s; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { border: 1px solid #E0E0E0; }
.card.best { border-top: 3px solid #00E5A0; }
.card-head { padding: 12px 14px 10px; border-bottom: 1px solid #E0E0E0; }
.card-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.card-approach { font-size: 11px; color: #6F6F6F; line-height: 1.5; }
.card-body { padding: 0 14px; }
.cost-sec { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #9F9F9F; padding: 8px 0 4px; }
.cost-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #F4F4F4; font-size: 12px; color: #3F3F3F; }
.cost-row:last-child { border: none; }
.cost-zero { color: #C8C8C8; }
.card-foot { border-top: 1px solid #E0E0E0; display: grid; grid-template-columns: 1fr 1fr; }
.foot-cell { padding: 10px 14px; }
.foot-cell + .foot-cell { border-left: 1px solid #E0E0E0; }
.foot-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #6F6F6F; margin-bottom: 3px; }
.foot-val { font-size: 15px; font-weight: 700; }
.sec { display: none; }
.sec.on { display: block; }
.foot-bar { background: #F4F4F4; border-top: 1px solid #E0E0E0; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 10px; color: #9F9F9F; text-transform: uppercase; letter-spacing: 0.05em; }
</style>

<div class="root">
  <div class="hdr">
    <div>
      <div class="hdr-name">Intellias</div>
      <div class="hdr-sub">HR platform investment — scenario analysis</div>
    </div>
    <div class="hdr-tag">Clear outcomes ahead</div>
  </div>

  <div class="ctrl">
    <div class="ctrl-lbl">Headcount (FTE)</div>
    <div class="ctrl-num" id="hcNum">2,000</div>
    <div class="slider-wrap">
      <input class="ctrl-range" type="range" min="0" max="4" step="1" value="1" id="sl">
      <div class="ticks">
        <span class="tick">1,500</span>
        <span class="tick">2,000</span>
        <span class="tick">3,000</span>
        <span class="tick">4,000</span>
        <span class="tick">5,000</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" id="t0" onclick="sv(0)">Summary</button>
    <button class="tab" id="t1" onclick="sv(1)">Cost breakdown</button>
  </div>

  <div class="body">
    <div class="sec on" id="s0">
      <div class="kpi-grid" id="kpis"></div>
      <div class="chart-box">
        <div class="chart-title">Year 1 total cost ($K) — one-time + recurring</div>
        <div id="b1"></div>
      </div>
      <div class="chart-box">
        <div class="chart-title">Year 2+ recurring cost ($K) — annual run rate</div>
        <div id="b2"></div>
      </div>
    </div>
    <div class="sec" id="s1">
      <div class="detail-grid" id="cards"></div>
    </div>
  </div>

  <div class="foot-bar">
    <span>All figures in $K annual unless noted</span>
    <span>Intellias internal — scenario modelling</span>
  </div>
</div>

<script>
var HC = [1500,2000,3000,4000,5000];
var C = ['#6F6F6F','#5C68DC','#00E5A0','#7EC0D7'];
var SC = [
  { name:'Do nothing', ap:'Critical fixes · Minimal enhancements · Decommission AI initiatives',
    rows:[
      {l:'Direct SGnA', v:[222.60,272.07,371.00,395.73,527.64]},
      {l:'Legal & compliance', v:[2.50,3.33,5.00,6.67,8.33]},
      {l:'Opportunity cost', v:[40.00,53.33,80.00,85.33,113.78]},
      {l:'Tech debt', v:[25.00,33.33,50.00,66.67,83.33]}
    ], ot:[] },
  { name:'In-house rebuild', ap:'Decommission Jira · Redesign Intems: PTO config, MCP layer · ~12-month development',
    rows:[
      {l:'Direct SGnA', v:[89.04,108.83,148.40,158.29,211.06]},
      {l:'Legal & compliance', v:[2.00,2.67,4.00,5.33,6.67]},
      {l:'Opportunity cost', v:[10.00,13.33,20.00,26.67,33.33]},
      {l:'Tech debt', v:[0,0,0,0,0]}
    ], ot:[{l:'1-time development', v:[168,168,168,168,168]}] },
  { name:'Core HR ops platform', ap:'Decommission Jira · Intems as back-end MCP layer · Implement Factorial',
    rows:[
      {l:'Direct SGnA', v:[89.04,108.83,148.40,158.29,211.06]},
      {l:'Legal & compliance', v:[2.00,2.67,4.00,5.33,6.67]},
      {l:'Opportunity cost', v:[10.00,13.33,20.00,26.67,33.33]},
      {l:'License cost', v:[125.00,166.67,250.00,333.33,416.67]}
    ], ot:[{l:'1-time integration', v:[84,84,84,84,84]}] },
  { name:'Innovation HRIS', ap:'Decommission Jira · Intems for engagement only · Implement Rippling',
    rows:[
      {l:'Direct SGnA', v:[44.52,54.41,74.20,79.15,105.53]},
      {l:'Legal & compliance', v:[1.00,1.33,2.00,2.67,3.33]},
      {l:'Opportunity cost', v:[10.00,13.33,20.00,26.67,33.33]},
      {l:'License cost', v:[1100,1200,1400,1600,1800]}
    ], ot:[{l:'1-time integration', v:[126,126,126,126,126]}] }
];

function rec(s,i){ return s.rows.reduce(function(a,r){return a+r.v[i];},0); }
function y1(s,i){ return rec(s,i)+s.ot.reduce(function(a,r){return a+r.v[i];},0); }
function fk(v){ return v===0?'—':'$'+v.toFixed(0)+'K'; }

function bars(id, vals, names){
  var mx=Math.max.apply(null,vals);
  document.getElementById(id).innerHTML=vals.map(function(v,i){
    return '<div class="bar-row"><div class="bar-top"><span class="bar-lname"><span class="kpi-dot" style="background:'+C[i]+'"></span>'+names[i]+'</span><span class="bar-amt">'+fk(v)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+((v/mx)*100).toFixed(1)+'%;background:'+C[i]+'"></div></div></div>';
  }).join('');
}

function render(){
  var idx=parseInt(document.getElementById('sl').value);
  document.getElementById('hcNum').textContent=HC[idx].toLocaleString();
  var y1s=SC.map(function(s){return y1(s,idx);});
  var mn=Math.min.apply(null,y1s);
  var names=SC.map(function(s){return s.name;});

  document.getElementById('kpis').innerHTML=SC.map(function(s,i){
    var best=y1s[i]===mn;
    return '<div class="kpi'+(best?' best':'')+'">'+
      (best?'<div class="kpi-badge">Lowest year 1</div>':'')+
      '<div class="kpi-name"><span class="kpi-dot" style="background:'+C[i]+'"></span>'+s.name+'</div>'+
      '<div class="kpi-y1">'+fk(y1s[i])+'</div>'+
      '<div class="kpi-y2">Year 2+: '+fk(rec(s,idx))+'/yr</div>'+
    '</div>';
  }).join('');

  bars('b1',y1s,names);
  bars('b2',SC.map(function(s){return rec(s,idx);}),names);

  document.getElementById('cards').innerHTML=SC.map(function(s,i){
    var best=y1s[i]===mn;
    var rr=s.rows.map(function(r){
      var z=r.v[idx]===0;
      return '<div class="cost-row"><span>'+r.l+'</span><span'+(z?' class="cost-zero"':'')+'>'+fk(r.v[idx])+'</span></div>';
    }).join('');
    var ot=s.ot.length?'<div class="cost-sec">One-time</div>'+s.ot.map(function(r){
      return '<div class="cost-row"><span>'+r.l+'</span><span>'+fk(r.v[idx])+'</span></div>';
    }).join(''):'';
    return '<div class="card'+(best?' best':'')+'">'+
      '<div class="card-head">'+
        (best?'<div class="kpi-badge" style="margin-bottom:5px">Lowest year 1</div>':'')+
        '<div class="card-name">'+s.name+'</div>'+
        '<div class="card-approach">'+s.ap+'</div>'+
      '</div>'+
      '<div class="card-body"><div class="cost-sec">Recurring</div>'+rr+ot+'</div>'+
      '<div class="card-foot">'+
        '<div class="foot-cell"><div class="foot-lbl">Year 1 total</div><div class="foot-val">'+fk(y1s[i])+'</div></div>'+
        '<div class="foot-cell"><div class="foot-lbl">Year 2+ / yr</div><div class="foot-val">'+fk(rec(s,idx))+'</div></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function sv(n){
  document.getElementById('s0').className='sec'+(n===0?' on':'');
  document.getElementById('s1').className='sec'+(n===1?' on':'');
  document.getElementById('t0').className='tab'+(n===0?' on':'');
  document.getElementById('t1').className='tab'+(n===1?' on':'');
}

document.getElementById('sl').addEventListener('input', render);
render();
</script>
